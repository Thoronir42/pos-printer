name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile binaries
        run: deno task compile

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pp-linux
            dist/pp-windows.exe
            dist/pp-macos
